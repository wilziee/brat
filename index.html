<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brat Generator - Xaerisoft Universe</title>
    <style>
        /* =========================================
           🎨 TEMA XAERISOFT UNIVERSE & RESET
        ========================================= */
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --purple: #8a2be2;
            --bg-dark: #050510;
            --glass-bg: rgba(20, 20, 35, 0.4);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* AURORA BACKGROUND */
        .aurora-bg {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle at 20% 30%, rgba(58, 123, 213, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(138, 43, 226, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 50% 50%, rgba(0, 210, 255, 0.1) 0%, transparent 60%);
            z-index: -2;
            animation: aurora-shift 15s ease-in-out infinite alternate;
        }

        @keyframes aurora-shift {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }

        /* PARTICLE CANVAS */
        #particle-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: -1;
            pointer-events: none;
        }

        /* =========================================
           🌟 UI & GLASSMORPHISM
        ========================================= */
        .container {
            width: 100%;
            max-width: 1100px;
            padding: 2rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            position: relative;
            z-index: 10;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(255, 255, 255, 0.02);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(to right, var(--primary), #a64dff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(0, 210, 255, 0.3);
            margin-bottom: 0.5rem;
        }

        .header p {
            color: #a0a0b0;
            font-size: 0.95rem;
        }

        /* CONTROLS */
        textarea {
            width: 100%;
            height: 180px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 1.2rem;
            color: white;
            font-size: 1.1rem;
            resize: none;
            outline: none;
            transition: all 0.3s ease;
        }

        textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.2);
        }

        .btn-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 1rem;
        }

        button {
            position: relative;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 0.8rem 1.2rem;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            outline: none;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--secondary), var(--purple));
            border: none;
            box-shadow: 0 0 15px rgba(138, 43, 226, 0.4);
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #4b8de5, #9c43f2);
            box-shadow: 0 0 25px rgba(138, 43, 226, 0.6);
        }

        .btn-reset {
            color: #ff4d4d;
            border-color: rgba(255, 77, 77, 0.3);
        }

        .btn-reset:hover {
            background: rgba(255, 77, 77, 0.1);
            border-color: #ff4d4d;
        }

        /* RIPPLE EFFECT */
        .ripple {
            position: absolute;
            border-radius: 50%;
            transform: scale(0);
            animation: ripple 0.6s linear;
            background: rgba(255, 255, 255, 0.4);
        }

        @keyframes ripple {
            to { transform: scale(4); opacity: 0; }
        }

        /* PREVIEW CANVAS */
        .preview-container {
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 16px;
            padding: 1rem;
            border: 1px solid var(--glass-border);
        }

        #brat-canvas {
            width: 100%;
            max-width: 500px;
            aspect-ratio: 1 / 1;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease;
            background-color: #ffffff; /* Sesuai dengan hasil Canvas */
        }

        #brat-canvas:hover {
            transform: scale(1.02);
        }

        /* RESPONSIVE */
        @media (max-width: 900px) {
            .container {
                grid-template-columns: 1fr;
                padding: 1rem;
            }
            #brat-canvas {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>

    <!-- Xaerisoft Background Effects -->
    <div class="aurora-bg"></div>
    <canvas id="particle-canvas"></canvas>

    <div class="container">
        <!-- Panel Kontrol -->
        <div class="glass-card">
            <div class="header">
                <h1>Brat Generator</h1>
                <p>Xaerisoft</p>
            </div>

            <textarea id="text-input" placeholder="Ketik sesuatu... otomatis menyesuaikan ukuran canvas!"></textarea>

            <div class="btn-group">
                <button class="btn-reset" onclick="resetText(event)">Reset</button>
                <button class="btn-primary" onclick="downloadImage('png', event)">Download PNG</button>
                <button class="btn-primary" onclick="downloadImage('jpeg', event)">Download JPG</button>
            </div>
            
            <p style="font-size: 0.8rem; color: #888; text-align: center; margin-top: 10px;">
                ✔ Live Preview &nbsp; ✔ Auto Resize &nbsp; ✔ 2048x2048 Output
            </p>
        </div>

        <!-- Panel Preview -->
        <div class="glass-card preview-container">
            <!-- Canvas aslinya dirender 2048x2048, tapi di-scale pakai CSS -->
            <canvas id="brat-canvas" width="2048" height="2048"></canvas>
        </div>
    </div>

    <script>
        /* =========================================================
           ✨ XAERISOFT UNIVERSE: GALAXY PARTICLES ENGINE (60 FPS)
        ========================================================= */
        const particleCanvas = document.getElementById('particle-canvas');
        const pCtx = particleCanvas.getContext('2d');
        let particles = [];

        function resizeParticleCanvas() {
            particleCanvas.width = window.innerWidth;
            particleCanvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeParticleCanvas);
        resizeParticleCanvas();

        class Particle {
            constructor() {
                this.x = Math.random() * particleCanvas.width;
                this.y = Math.random() * particleCanvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = Math.random() * 0.5 - 0.25;
                this.speedY = Math.random() * 0.5 - 0.25;
                this.opacity = Math.random() * 0.5 + 0.1;
                this.glow = Math.random() > 0.8 ? true : false;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                if (this.x > particleCanvas.width) this.x = 0;
                if (this.x < 0) this.x = particleCanvas.width;
                if (this.y > particleCanvas.height) this.y = 0;
                if (this.y < 0) this.y = particleCanvas.height;
            }
            draw() {
                pCtx.beginPath();
                pCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                
                if (this.glow) {
                    pCtx.shadowBlur = 10;
                    pCtx.shadowColor = '#00d2ff';
                    pCtx.fillStyle = `rgba(255, 255, 255, ${this.opacity + 0.2})`;
                } else {
                    pCtx.shadowBlur = 0;
                    pCtx.fillStyle = `rgba(138, 43, 226, ${this.opacity})`;
                }
                
                pCtx.fill();
            }
        }

        function initParticles() {
            particles = [];
            let count = (window.innerWidth * window.innerHeight) / 9000; 
            for (let i = 0; i < count; i++) {
                particles.push(new Particle());
            }
        }

        function animateParticles() {
            pCtx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
            }
            requestAnimationFrame(animateParticles);
        }

        initParticles();
        animateParticles();


        /* =========================================================
           📝 BRAT TEXT ENGINE: SMART FONT & WORD WRAP ALGORITHM
        ========================================================= */
        const canvas = document.getElementById('brat-canvas');
        const ctx = canvas.getContext('2d');
        const input = document.getElementById('text-input');

        // Konstanta Canvas Brat
        const CANVAS_SIZE = 2048;
        const MARGIN_X = 160; // Margin kiri yang pas
        const MARGIN_Y = 160; // Margin atas yang pas untuk pojok kiri atas
        const MAX_WIDTH = CANVAS_SIZE - (MARGIN_X * 2);
        const MAX_HEIGHT = CANVAS_SIZE - (MARGIN_Y * 2);
        
        // Warna Background Sesuai Screenshot
        const BRAT_BG = '#FFFFFF';

        // Fungsi Word Wrap Cerdas
        function wrapText(context, text, maxWidth) {
            const paragraphs = text.split('\n');
            const lines = [];

            for (let p = 0; p < paragraphs.length; p++) {
                const words = paragraphs[p].split(' ');
                let currentLine = words[0] || '';

                for (let i = 1; i < words.length; i++) {
                    const word = words[i];
                    const width = context.measureText(currentLine + " " + word).width;
                    if (width < maxWidth) {
                        currentLine += " " + word;
                    } else {
                        lines.push(currentLine);
                        currentLine = word;
                    }
                }
                lines.push(currentLine);
            }
            return lines;
        }

        // Engine Utama
        function drawBrat() {
            let rawText = input.value;
            if (rawText.trim() === '') rawText = 'isi teks';

            // 1. Reset Canvas Background ke Putih
            ctx.fillStyle = BRAT_BG;
            ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

            // 2. Setup Base Styling
            ctx.fillStyle = '#000000'; // Warna teks hitam pekat
            ctx.textBaseline = 'top';
            ctx.textAlign = 'left';
            ctx.shadowColor = 'transparent'; 
            ctx.shadowBlur = 0;
            
            // Pengaturan letter spacing yang rapat
            if ('letterSpacing' in ctx) {
                ctx.letterSpacing = '-0.04em'; 
            }

            // 3. Smart Font Algorithm (Mencari Font Terbesar yang Muat)
            let fontSize = 800; // Mulai dari sangat besar
            const minFontSize = 30;
            let lines = [];
            let lineHeight = 0;
            let totalHeight = 0;

            while (fontSize >= minFontSize) {
                // WAJIB: Helvetica/Arial, 400 (Regular), Tidak Bold, Tidak Italic
                ctx.font = `400 ${fontSize}px Helvetica, Arial, sans-serif`;
                
                // Line spacing sangat rapat khas Brat
                lineHeight = fontSize * 0.88; 

                lines = wrapText(ctx, rawText, MAX_WIDTH);
                totalHeight = lines.length * lineHeight;

                // Cek apakah ada 1 kata utuh yang melebihi max-width
                let isWidthExceeded = false;
                for(let line of lines) {
                    if(ctx.measureText(line).width > MAX_WIDTH) {
                        isWidthExceeded = true;
                        break;
                    }
                }

                // Jika sudah muat ke dalam padding margin, berhenti mengecilkan!
                if (!isWidthExceeded && totalHeight <= MAX_HEIGHT) {
                    break;
                }

                // Jika belum muat, kecilkan font perlahan
                fontSize -= Math.max(2, Math.floor(fontSize * 0.05));
            }

            // 4. Posisi Y di-fix dari atas (Sesuai gambar referensi, teks nempel di pojok kiri atas)
            let startY = MARGIN_Y;

            // 5. Render Teks dengan Filter Blur tipis 0.2px
            ctx.filter = 'blur(0.2px)';
            
            for (let i = 0; i < lines.length; i++) {
                ctx.fillText(lines[i], MARGIN_X, startY + (i * lineHeight));
            }

            // Reset filter
            ctx.filter = 'none';
        }

        /* =========================================================
           🖱️ UI INTERACTIONS
        ========================================================= */

        // Live Preview Event
        input.addEventListener('input', drawBrat);

        // Fungsi Reset
        function resetText(e) {
            createRipple(e);
            input.value = 'isi teks';
            drawBrat();
        }

        // Fungsi Download High-Res
        function downloadImage(type, e) {
            createRipple(e);
            const link = document.createElement('a');
            link.download = `brat-xaerisoft.${type}`;
            
            // Gunakan kualitas max untuk JPG (1.0)
            const mimeType = type === 'png' ? 'image/png' : 'image/jpeg';
            link.href = canvas.toDataURL(mimeType, 1.0);
            
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // Efek Button Ripple Premium
        function createRipple(event) {
            const button = event.currentTarget;
            const circle = document.createElement("span");
            const diameter = Math.max(button.clientWidth, button.clientHeight);
            const radius = diameter / 2;

            const rect = button.getBoundingClientRect();
            circle.style.width = circle.style.height = `${diameter}px`;
            circle.style.left = `${event.clientX - rect.left - radius}px`;
            circle.style.top = `${event.clientY - rect.top - radius}px`;
            circle.classList.add("ripple");

            const existingRipple = button.querySelector('.ripple');
            if (existingRipple) {
                existingRipple.remove();
            }

            button.appendChild(circle);
            
            setTimeout(() => {
                circle.remove();
            }, 600);
        }

        // Render Pertama Kali
        window.onload = drawBrat;
    </script>
</body>
</html>
